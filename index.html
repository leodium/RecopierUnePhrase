
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Copie de phrases</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:10px;
    text-align:center;
    color:#333;
}

.container{
    max-width:850px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    margin:10px 0;
    font-size:24px;
}

.consignes{
    background:#eef5ff;
    padding:12px;
    border-radius:12px;
    text-align:left;
    margin-bottom:15px;
    font-size:14px;
}

.phrase{
    font-size:26px;
    font-weight:bold;
    margin:15px 0;
    min-height:60px;
}

input{
    width:95%;
    max-width:700px;
    padding:12px;
    font-size:20px;
    border-radius:10px;
    border:2px solid #ccc;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.feedback{
    margin-top:15px;
    font-size:18px;
    min-height:50px;
    line-height:1.6;
    text-align:left;
    background:#fafafa;
    padding:10px;
    border-radius:10px;
}

.feedback .error{
    margin-bottom:8px;
    padding:6px;
    background:#ffecec;
    border-left:4px solid #e74c3c;
}

.attempts, .score, #timer{
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
}

.balls{
    margin-top:15px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
}

.ball{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#bbb;
}

.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}

.end-message{
    font-size:22px;
    margin-top:15px;
    color:#27ae60;
    font-weight:bold;
}

#restartBtn{
    margin-top:12px;
    padding:10px 20px;
    font-size:16px;
    background:#27ae60;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<h1>📚 Copie la phrase</h1>

<div class="consignes">
<ul>
<li>✏️ Recopie exactement la phrase.</li>
<li>🔠 Attention aux majuscules.</li>
<li>❗ Attention à la ponctuation.</li>
<li>🎯 3 essais maximum.</li>
</ul>

<p><b>🏆 Points :</b><br>
🥇 1er essai = 3 points<br>
🥈 2e essai = 2 points<br>
🥉 3e essai = 1 point
</p>

</div>

<div id="phrase" class="phrase"></div>

<input type="text" id="answer">

<br>

<button onclick="checkAnswer()">Valider</button>

<div id="attempts" class="attempts"></div>
<div id="feedback" class="feedback"></div>

<div id="score" class="score">Score : 0 / 0</div>
<div id="timer">Temps : 00:00</div>

<div id="balls" class="balls"></div>

<div id="endMessage" class="end-message"></div>

</div>

<script>

// =======================
// PHRASES
// =======================
const allPhrases = [
"Le petit chat noir dort sur le canapé.",
"Papa prépare une grande pizza pour le repas.",
"La prof écrit la date au tableau noir.",
"Le chien blanc court vite dans le jardin.",
"Emma dessine un joli soleil dans son cahier.",
"Le bébé regarde les oiseaux par la vitre.",
"Nous jouons ensemble dans la grande cour d'école.",
"Le lapin gris mange une carotte dans l'herbe.",
"Le soleil brille fort pendant toute la journée.",
"Marie range ses livres après la classe du matin.",
"Le garçon ouvre doucement la porte de la cuisine.",
"La petite souris mange un morceau de fromage jaune.",
"Tom construit une haute tour avec ses cubes rouges.",
"Le fermier nourrit les poules près de la grange.",
"Le poisson rouge nage lentement dans le grand aquarium.",
"Julie écoute une histoire avant de dormir ce soir.",
"Le vent froid souffle très fort dans les arbres.",
"Le pirate cherche un trésor sur la grande île.",
"Mon frère joue au ballon avec ses amis dehors.",
"Le cheval saute facilement par dessus la vieille barrière.",
"La pluie tombe sur les toits de la ville.",
"Les enfants jouent dans le parc après l'école.",
"Maman prépare un gâteau au chocolat délicieux.",
"Le chat gris se cache sous la table.",
"Le chien aboie dans le jardin.",
"Nous marchons vers la maison en silence.",
"Le train arrive doucement à la gare.",
"Le maître corrige les cahiers des élèves.",
"Les oiseaux chantent dans les arbres du parc.",
"Le soleil se lève tôt le matin.",
"Le bébé dort dans son petit lit blanc.",
"Les élèves rangent leurs affaires dans leur sac.",
"Le jardin est plein de fleurs colorées.",
"Le bus jaune passe devant l'école chaque jour.",
"Le garçon lit une bande dessinée amusante.",
"La fille dessine une belle maison.",
"Le chat joue avec une balle rouge.",
"Le chien court derrière le ballon.",
"Nous mangeons à la cantine de l'école.",
"Le vent fait bouger les feuilles des arbres.",
"Le poisson nage dans l'eau claire.",
"Les enfants rient dans la cour de récréation.",
"Maman lit une histoire avant le coucher.",
"Le papa conduit la voiture vers la maison.",
"Les fleurs poussent dans le jardin.",
"Le ciel est bleu aujourd'hui.",
"Le garçon joue avec ses jouets dans sa chambre.",
"La maîtresse explique la leçon au tableau.",
"Les oiseaux volent dans le ciel.",
"Le soir, nous regardons la télévision ensemble."
];

// =======================
let phrases = [...allPhrases].sort(()=>Math.random()-0.5).slice(0,10);

let current = 0;
let tries = 0;
let score = 0;

let startTime = Date.now();
let timerInterval = null;

// =======================
const phraseEl = document.getElementById("phrase");
const answerEl = document.getElementById("answer");
const feedbackEl = document.getElementById("feedback");
const attemptsEl = document.getElementById("attempts");
const scoreEl = document.getElementById("score");
const ballsEl = document.getElementById("balls");
const endEl = document.getElementById("endMessage");

// =======================
// TIMER mm:ss
// =======================
function updateTimer(){
    let total = Math.floor((Date.now()-startTime)/1000);
    let min = Math.floor(total / 60);
    let sec = total % 60;

    if(sec < 10) sec = "0" + sec;

    document.getElementById("timer").innerHTML =
    "Temps : " + min + ":" + sec;
}

// =======================
for(let i=0;i<10;i++){
    let b=document.createElement("div");
    b.classList.add("ball");
    b.id="ball"+i;
    ballsEl.appendChild(b);
}

// =======================
function load(){

    if(current>=phrases.length){

        clearInterval(timerInterval);

        let total = Math.floor((Date.now()-startTime)/1000);
        let min = Math.floor(total / 60);
        let sec = total % 60;
        if(sec < 10) sec = "0" + sec;

        phraseEl.innerHTML="";
        answerEl.classList.add("hidden");
        document.querySelector("button").classList.add("hidden");

        endEl.innerHTML =
        "🎉 Terminé !<br><br>" +
        "Score : " + score + " / " + (phrases.length*3) +
        "<br>Temps : " + min + ":" + sec + "<br><br>" +
        "<button id='restartBtn' onclick='restart()'>Recommencer</button>";

        return;
    }

    phraseEl.innerHTML = phrases[current];
    answerEl.value="";
    answerEl.focus();

    tries=0;
    attemptsEl.innerHTML="Essai : 1 / 3";

    scoreEl.innerHTML="Score : "+score+" / "+(current*3);

    if(!timerInterval){
        startTime=Date.now();
        timerInterval=setInterval(updateTimer,500);
    }
}

// =======================
function checkAnswer(){

    const correct = phrases[current];
    const user = answerEl.value;

    tries++;

    let errors = [];

    if(user.charAt(0)!==correct.charAt(0))
        errors.push("Majuscule incorrecte");

    if(!user.endsWith(".") && !user.endsWith(","))
        errors.push("Ponctuation manquante");

    if(user.includes("  "))
        errors.push("Trop d'espaces");

    if(user.trim()!==user)
        errors.push("Espaces inutiles");

    if(user===correct){

        let gain = tries===1?3:tries===2?2:1;

        document.getElementById("ball"+current)
        .classList.add(tries===1?"green":"orange");

        score+=gain;
        current++;

        feedbackEl.innerHTML="✅ Correct";

        setTimeout(load,1000);
        return;
    }

    let html = "";

    if(tries>=2){
        errors.forEach(e=>{
            html += `<div class="error">❌ ${e}</div>`;
        });

        feedbackEl.innerHTML =
        "Erreurs détectées :<br><br>" + html;
    } else {
        feedbackEl.innerHTML =
        "❌ Essaie encore<br><br>" + errors.join("<br>");
    }

    if(tries>=3){

        document.getElementById("ball"+current)
        .classList.add("red");

        feedbackEl.innerHTML +=
        "<br><br>✔ Phrase correcte :<br><b>" + correct + "</b>";

        current++;

        setTimeout(load,2500);
        return;
    }

    attemptsEl.innerHTML="Essai : "+tries+" / 3";
}

// =======================
function restart(){

    current=0;
    tries=0;
    score=0;

    answerEl.classList.remove("hidden");
    document.querySelector("button").classList.remove("hidden");

    endEl.innerHTML="";
    feedbackEl.innerHTML="";
    ballsEl.innerHTML="";

    for(let i=0;i<10;i++){
        let b=document.createElement("div");
        b.classList.add("ball");
        b.id="ball"+i;
        ballsEl.appendChild(b);
    }

    clearInterval(timerInterval);
    timerInterval=null;

    startTime=Date.now();
    timerInterval=setInterval(updateTimer,500);

    load();
}

answerEl.addEventListener("keydown",e=>{
    if(e.key==="Enter") checkAnswer();
});

load();

</script>

</body>
</html>
