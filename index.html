<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Copie de phrases</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:10px;
}

/* TITRE */
.title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    margin:10px 0 20px 0;
}

/* 3 COLONNES */
.top{
    display:flex;
    gap:12px;
    max-width:1200px;
    margin:auto;
}

.box{
    border-radius:14px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
    flex:1;
}

.blue{background:#d9ecff;}
.greenbox{background:#d8ffe1;}

.grid-right{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.smallbox{
    background:white;
    border-radius:12px;
    padding:10px;
    text-align:center;
    font-weight:bold;
}

/* ZONE EXERCICE */
.container{
    max-width:900px;
    margin:15px auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
    position:relative;
}

/* OVERLAY START */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:16px;
    z-index:10;
    flex-direction:column;
}

.start-btn{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

.start-btn:hover{
    background:#27ae60;
}

/* CONTENU */
.phrase{
    font-size:26px;
    font-weight:bold;
    margin:15px 0;
    min-height:60px;
}

input{
    width:95%;
    max-width:700px;
    padding:12px;
    font-size:20px;
    border-radius:10px;
    border:2px solid #ccc;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.feedback{
    margin-top:15px;
    font-size:18px;
    min-height:50px;
    text-align:left;
    background:#fafafa;
    padding:10px;
    border-radius:10px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="title">✍️ Copie de phrases</div>

<!-- 3 COLONNES -->
<div class="top">

    <div class="box blue">
        <h3>📋 Consignes</h3>
        <p>✏️ Recopie exactement la phrase</p>
        <p>🔠 Majuscules importantes</p>
        <p>❗ Ponctuation obligatoire</p>
        <p>🎯 3 essais maximum</p>
    </div>

    <div class="box blue">
        <h3>🎯 Essais</h3>
        <p>🥇 1er essai = 3 points</p>
        <p>🥈 2e essai = 2 points</p>
        <p>🥉 3e essai = 1 point</p>
    </div>

    <div class="box greenbox">
        <div class="grid-right">
            <div class="smallbox">
                📊 Score<br>
                <span id="score">0 / 0</span>
            </div>

            <div class="smallbox">
                ⏱️ Temps<br>
                <span id="timer">0 minute 0 seconde</span>
            </div>
        </div>
    </div>

</div>

<!-- ZONE EXERCICE -->
<div class="container">

<div id="overlay" class="overlay">
    <button class="start-btn" onclick="startGame()">
        ▶ Clique quand tu es prêt
    </button>
</div>

<div id="phrase" class="phrase"></div>

<input type="text" id="answer">

<br>

<button onclick="checkAnswer()">Valider</button>

<div id="feedback" class="feedback"></div>

</div>

<script>

// ===== PHRASES =====
const allPhrases = [
"Le petit chat noir dort sur le canapé.",
"Papa prépare une grande pizza pour le repas.",
"La prof écrit la date au tableau noir.",
"Le chien blanc court vite dans le jardin.",
"Emma dessine un joli soleil dans son cahier.",
"Le bébé regarde les oiseaux par la vitre.",
"Nous jouons ensemble dans la grande cour d'école.",
"Le lapin gris mange une carotte dans l'herbe.",
"Le soleil brille fort pendant toute la journée.",
"Marie range ses livres après la classe du matin."
];

let phrases = [...allPhrases].sort(() => Math.random() - 0.5).slice(0, 10);

let current = 0;
let tries = 0;
let score = 0;

let startTime = null;
let timerInterval = null;
let started = false;

const phraseEl = document.getElementById("phrase");
const answerEl = document.getElementById("answer");
const feedbackEl = document.getElementById("feedback");

// ===== START =====
function startGame(){
    document.getElementById("overlay").style.display = "none";
    load();
}

// ===== TIMER =====
function updateTimer(){

    let t = Math.floor((Date.now() - startTime) / 1000);

    let m = Math.floor(t / 60);
    let s = t % 60;

    if(s < 10) s = "0" + s;

    let minText = (m <= 1) ? "minute" : "minutes";
    let secText = (t <= 1) ? "seconde" : "secondes";

    document.getElementById("timer").innerHTML =
        m + " " + minText + " " + s + " " + secText;
}

// ===== START TIMER =====
function startTimer(){
    if(started) return;
    started = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 500);
}

answerEl.addEventListener("focus", startTimer);
answerEl.addEventListener("input", () => {
    if(answerEl.value.length === 1) startTimer();
});

// ===== LOAD =====
function load(){

    if(current >= phrases.length){

        clearInterval(timerInterval);

        phraseEl.innerHTML = "";
        answerEl.classList.add("hidden");

        return;
    }

    phraseEl.innerHTML = phrases[current];
    answerEl.value = "";
    answerEl.focus();

    tries = 0;

    document.getElementById("score").innerHTML =
        score + " / " + (current * 3);
}

// ===== CHECK =====
function checkAnswer(){

    let correct = phrases[current];
    let user = answerEl.value;

    tries++;

    let errors = [];

    if(user.charAt(0) !== correct.charAt(0))
        errors.push("Majuscule");

    if(user === correct){

        let gain = tries === 1 ? 3 : tries === 2 ? 2 : 1;

        score += gain;
        current++;

        feedbackEl.innerHTML = "✅ Correct";

        load();
        return;
    }

    feedbackEl.innerHTML = "❌ " + errors.join("<br>");

    if(tries >= 3){
        current++;
        load();
    }
}

</script>

</body>
</html>
